<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynthStack - Support</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #222; }
  [dir="rtl"] { text-align: right; }
  h1 { font-size: 1.6em; }
  a { color: #0066cc; }
  .lang-select { margin-bottom: 20px; font-size: 0.95em; }
  .lang-select select { padding: 4px 8px; font-size: 0.95em; }
</style>
</head>
<body>

<div class="lang-select">
  <label for="lang">Language: </label>
  <select id="lang" onchange="switchLang(this.value)">
    <option value="en">English</option>
    <option value="tr">Türkçe</option>
    <option value="zh">中文(简体)</option>
    <option value="ja">日本語</option>
    <option value="ru">Русский</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="pt">Português</option>
    <option value="hi">हिन्दी</option>
    <option value="ar">العربية</option>
    <option value="it">Italiano</option>
    <option value="ko">한국어</option>
    <option value="es">Español</option>
  </select>
</div>

<div id="content"></div>

<script>
const translations = {
  en: `
<h1>SynthStack Support</h1>
<p>For questions, feedback, or bug reports, please contact the developer at:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  tr: `
<h1>SynthStack Destek</h1>
<p>Sorularınız, geri bildirimleriniz veya hata raporlarınız için lütfen geliştiriciyle iletişime geçin:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  zh: `
<h1>SynthStack 支持</h1>
<p>如有问题、反馈或错误报告，请联系开发者：</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  ja: `
<h1>SynthStack サポート</h1>
<p>ご質問、フィードバック、またはバグ報告については、開発者までご連絡ください：</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  ru: `
<h1>Поддержка SynthStack</h1>
<p>По вопросам, отзывам или сообщениям об ошибках, пожалуйста, свяжитесь с разработчиком:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  fr: `
<h1>Support SynthStack</h1>
<p>Pour toute question, commentaire ou signalement de bug, veuillez contacter le développeur à :</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  de: `
<h1>SynthStack Support</h1>
<p>Bei Fragen, Feedback oder Fehlerberichten kontaktieren Sie bitte den Entwickler unter:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  pt: `
<h1>Suporte SynthStack</h1>
<p>Para questões, comentários ou relatórios de erros, por favor contacte o programador em:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  hi: `
<h1>SynthStack सहायता</h1>
<p>प्रश्नों, प्रतिक्रिया या बग रिपोर्ट के लिए, कृपया डेवलपर से संपर्क करें:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  es: `
<h1>Soporte de SynthStack</h1>
<p>Para preguntas, comentarios o informes de errores, ponte en contacto con el desarrollador en:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  ko: `
<h1>SynthStack 지원</h1>
<p>질문, 피드백 또는 버그 보고는 개발자에게 연락해 주세요:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  it: `
<h1>Supporto SynthStack</h1>
<p>Per domande, feedback o segnalazioni di bug, contatta lo sviluppatore all'indirizzo:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`,
  ar: `
<h1>دعم SynthStack</h1>
<p>للأسئلة أو الملاحظات أو الإبلاغ عن الأخطاء، يرجى التواصل مع المطور على:</p>
<p><a href="mailto:nurullah201@gmail.com">nurullah201@gmail.com</a></p>
`
};

function switchLang(lang) {
  document.getElementById('content').innerHTML = translations[lang] || translations['en'];
  document.documentElement.lang = lang;
  document.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const url = new URL(window.location);
  url.searchParams.set('lang', lang);
  window.history.replaceState({}, '', url);
  document.getElementById('lang').value = lang;
}

const params = new URLSearchParams(window.location.search);
const lang = (params.get('lang') || 'en').toLowerCase();
switchLang(translations[lang] ? lang : 'en');
</script>
</body>
</html>
